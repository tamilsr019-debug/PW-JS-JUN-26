looping :
--------

for -> “Use for when you know how many times to repeat.”

while → “Check first, then act”
do-while → “Act first, then check”

while loop example :
------------------

const nextButton = page.locator('.navgbutton');

while (await nextButton.isEnabled()) {
  await nextButton.click();
}

*******************************************************************************************

Login Retry Example (Framework Level) - do while loop :
-----------------------------------------
let loginSuccess;
let attempt = 0;

do {
    loginSuccess = await performLogin(username, password);
    attempt++;

} while (!loginSuccess && attempt < 3);

if (!loginSuccess) {
    console.log("Account locked or invalid credentials");
}


