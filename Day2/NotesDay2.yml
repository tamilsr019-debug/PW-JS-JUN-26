Equality Operator applied on "null" and "undefined"
---------------------------------------------------

null == undefined → Why TRUE?
console.log(null == undefined);  // true

-------------------------------------------------------------

Strict Equality (===) in undefined and null:
-----------------------------------------------

1️⃣ console.log(null === undefined) // false
🔎 Internally (Abstract Equality Comparison Algorithm)

When JS sees:

null == undefined


It follows a special rule defined in ECMAScript spec:

If one value is null and the other is undefined, return true.

🚨 No type conversion happens here.

It is a direct hard-coded rule in the spec.

So internally:

Step 1: Types are different
Step 2: It is special ECMA rule

---------------------------------------------------------------------------------

1️⃣ console.log(undefined === undefined) // true

Why is this true?

Both sides are undefined

Same type → undefined

Same value → undefined

So result is true.

2️⃣ Loose Equality (==)
== checks:

✅ Value

⚠️ Allows type conversion (coercion)

console.log(undefined == undefined) // true
Why is this also true?

Because:

Both sides are already undefined

No type conversion needed

They are identical

So result is again true.

