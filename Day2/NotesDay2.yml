Hoisting :
---------

Hoisting is JavaScript’s behavior of scanning the entire .js file before execution, 
collecting all var declarations, and creating memory for them with the value undefined before any line of code runs.

Example

console.log(a); // undefined
var a = 10;


What JS internally does during the scan phase:

a → undefined   (memory created)

Then during execution phase:

a = 10

So this works because:

The declaration is hoisted, but the value is assigned later

------------------------------------------------------------------------

🟦 Hoisting with let

JavaScript scans the whole file, finds let declarations, and creates memory for them — but does NOT assign undefined.
They stay in a Temporary Dead Zone (TDZ) until the declaration line is executed.

Example
console.log(a); // ❌ ReferenceError
let a = 10;

What happens internally

Scan phase

a → <uninitialized>   (TDZ)

Execution phase

let a = 10  → now value is assigned

Because a has no value yet, accessing it before the declaration is illegal.

------------------------------------------------------------------------
🟥 Hoisting with const

JavaScript scans the whole file, creates memory for const, but keeps it uninitialized in TDZ — and it must be assigned immediately at the declaration line.

Example
console.log(b); // ❌ ReferenceError
const b = 20;

Internally

Scan phase

b → <uninitialized>   (TDZ)


Execution phase

const b = 20 → assigned once, then locked 🔒

------------------------------------------------------------------------
SUMMARY ON HOISTING for var,let and const :
------------------------------------------

var is hoisted with undefined,
let and const are hoisted too — but locked in TDZ until their line executes.

-----------------------------------------------------------

THE STORY BEHIND HOISTING :
---------------------------
Why did JavaScript introduce hoisting for var?

Because JavaScript was designed to be forgiving and beginner-friendly.

In 1995, JavaScript was created in just 10 days for non-programmers writing small scripts inside HTML pages.
People wrote code like this:

total = price + tax;
var price = 100;
var tax = 10;


In strict languages like Java or C, this would crash.
But JS designers wanted this to work without errors.

So they said:

“Before running the code, scan the whole file and register all var variables first.”

That decision created hoisting.

